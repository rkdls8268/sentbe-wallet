version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: sentbe-postgres
    restart: always
    environment:
      POSTGRES_DB: sentbe
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: